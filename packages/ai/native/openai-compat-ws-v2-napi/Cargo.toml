[package]
name = "openai-compat-ws-v2-napi"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
futures-util = "0.3"
http = "1"
napi = { version = "2", features = ["tokio_rt"] }
napi-derive = "2"
once_cell = "1"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
url = "2"
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
napi-build = "2"

[package.metadata.napi]
name = "openai-compat-ws-v2-napi"
